name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Secret Scan
        run: npm run security:scan

      - name: Safety Evals
        run: npm run evals

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Dependency Audit
        run: npm audit --omit=dev
